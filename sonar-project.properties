# ── Project identity ─────────────────────────────────────────────────────────
sonar.projectKey=nudratuppal_FlaskProject
sonar.organization=nudratuppal

# ── Sources ───────────────────────────────────────────────────────────────────
sonar.sources=.
sonar.inclusions=app.py
sonar.exclusions=**/__pycache__/**,**/tests/**,**/.venv/**

# ── Language ──────────────────────────────────────────────────────────────────
sonar.python.version=3.12

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.python.coverage.reportPaths=coverage.xml

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=tests
sonar.test.inclusions=tests/test_*.py
